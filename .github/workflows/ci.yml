name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Builds the whole workspace: the libscheme library, the `scheme` REPL,
      # and the `posix` extension crate.
      - name: Build
        run: cargo build --workspace --all-targets

      # Runs every gate: per-subsystem unit tests, the integration suites, and
      # the golden R4RS acceptance test (tests/r4rs_suite.rs) that drives the
      # original Aubrey Jaffer test.scm through the interpreter.
      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check
